<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FlashTerm">
  <meta name="description" content="XCS229 Machine Learning flashcards">
  <title>FlashTerm — XCS229</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <div class="scanlines" aria-hidden="true"></div>

  <div class="app">

    <header class="header">
      <div class="logo">FLASH<span class="logo-accent">TERM</span><span class="logo-sub"> / XCS229</span></div>
      <div class="header-controls">
        <a href="code.html" class="ctrl-btn" style="text-decoration:none">&#x276F;_ CODE LAB</a>
        <button id="shuffleBtn" class="ctrl-btn" aria-label="Toggle shuffle mode" aria-pressed="false">
          &#x21C4; SHUFFLE
        </button>
      </div>
    </header>

    <!-- Category filter -->
    <nav class="cat-nav" id="catNav" aria-label="Filter by topic">
      <button class="cat-btn active" data-cat="all">ALL</button>
      <!-- populated by app.js from CATEGORIES -->
    </nav>

    <main class="main">

      <div class="progress-track">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-meta">
          <span class="progress-counter">
            <span id="progressCurrent" class="counter-current">01</span>
            <span class="counter-sep"> / </span>
            <span id="progressTotal" class="counter-total">00</span>
          </span>
          <span id="progressStats" class="progress-stats"></span>
        </div>
      </div>

      <div
        class="card-scene"
        id="cardScene"
        role="button"
        tabindex="0"
        aria-label="Flashcard — click or press Space to flip"
      >
        <div class="card" id="card">

          <div class="card-face card-front">
            <div class="face-header">
              <span class="face-label">QUESTION</span>
              <span class="face-cat-tag" id="faceCatTag"></span>
            </div>
            <div class="face-content" id="questionText"></div>
            <div class="face-hint">
              <span class="kbd-hint">press <kbd>SPACE</kbd> or click to reveal</span>
              <span class="touch-hint">tap to reveal</span>
            </div>
          </div>

          <div class="card-face card-back">
            <div class="face-header">
              <span class="face-label face-label--answer">ANSWER</span>
              <span class="face-cat-tag" id="faceCatTagBack"></span>
            </div>
            <div class="face-content" id="answerText"></div>
            <div class="card-actions">
              <button id="gotItBtn" class="mark-btn mark-btn--got" aria-label="Mark as got it">
                &#x2713; GOT IT
              </button>
              <button id="reviewBtn" class="mark-btn mark-btn--review" aria-label="Mark for review">
                &#x21BA; REVIEW
              </button>
            </div>
          </div>

        </div>
      </div>

      <div class="nav-row">
        <button id="prevBtn" class="nav-btn" aria-label="Previous card" disabled>&#9664; PREV</button>
        <div class="status-pip" id="statusPip" aria-label="Card status"></div>
        <button id="nextBtn" class="nav-btn" aria-label="Next card">NEXT &#9654;</button>
      </div>

    </main>

    <footer class="footer">
      <div class="kbd-row">
        <span><kbd>SPACE</kbd> flip</span>
        <span><kbd>&#8592;&#8594;</kbd> navigate</span>
        <span><kbd>G</kbd> got it</span>
        <span><kbd>R</kbd> review</span>
        <span><kbd>S</kbd> shuffle</span>
      </div>
    </footer>

  </div>

  <script src="cards.js"></script>
  <script src="app.js"></script>
</body>
</html>
